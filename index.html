<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美食预约</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="authPage" class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">🍽️</div>
            <h1>美食预约</h1>
            
            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="auth-btn" onclick="handleLogin()">登录</button>
                <div class="auth-switch" onclick="showRegister()">还没有账号？立即注册</div>
            </div>

            <div id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="regPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请设置密码（至少4位）">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="regName" placeholder="请输入昵称（选填）">
                </div>
                <button class="auth-btn" onclick="handleRegister()">注册</button>
                <div class="auth-switch" onclick="showLogin()">已有账号？立即登录</div>
            </div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header class="header">
            <button class="back-btn" id="backBtn" style="display: none;" onclick="goBack()">
                <span class="arrow">←</span>
            </button>
            <h1 class="title" id="pageTitle">餐厅预订</h1>
            <div class="header-right">
                <button class="logout-btn" onclick="handleLogout()">退出</button>
            </div>
        </header>

        <main id="mainContent">
            <div id="pageHome" class="page active">
                <div class="hero-card">
                    <h2>餐厅预订</h2>
                    <p>选择服务，开始预定</p>
                </div>
                
                <div class="menu-grid">
                    <div class="menu-card" onclick="navigateTo('booking')">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <span class="menu-label">餐饮预订</span>
                    </div>

                    <div class="menu-card" onclick="navigateTo('profile')">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span class="menu-label">我的信息</span>
                    </div>

                    <div class="menu-card horizontal" onclick="navigateTo('orders')">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 3h18v18H3z"></path>
                                <path d="M16 3v18"></path>
                                <path d="M8 3v18"></path>
                                <path d="M3 9h18"></path>
                            </svg>
                        </div>
                        <span class="menu-label">我的订单</span>
                    </div>
                </div>
            </div>

            <div id="pageBooking" class="page">
                <div class="section-header">
                    <h2>选择菜品</h2>
                </div>

                <div class="category-tabs">
                    <button class="tab active" onclick="switchCategory('recommend')">招牌推荐</button>
                    <button class="tab" onclick="switchCategory('hot')">热菜</button>
                    <button class="tab" onclick="switchCategory('staple')">主食</button>
                    <button class="tab" onclick="switchCategory('drink')">饮品</button>
                </div>

                <div class="food-list" id="foodList"></div>

                <div class="bottom-bar">
                    <div class="total-info">
                        <span>已选 <span id="selectedCount">0</span> 件</span>
                        <span class="total-price">合计 ¥<span id="totalPrice">0</span></span>
                    </div>
                    <button class="book-btn" onclick="submitBooking()">立即预订</button>
                </div>
            </div>

            <div id="pageProfile" class="page">
                <div class="profile-card">
                    <h2>个人信息</h2>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="name" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label>地址</label>
                        <input type="text" id="address" placeholder="请输入地址">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="remark" placeholder="请输入备注信息"></textarea>
                    </div>
                    <button class="save-btn" onclick="saveProfile()">保存信息</button>
                </div>
            </div>

            <div id="pageOrders" class="page">
                <div class="order-list" id="orderList">
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-icon">🍽️</div>
                        <p>暂无订单</p>
                        <button class="empty-btn" onclick="navigateTo('booking')">去点餐</button>
                    </div>
                </div>

                <div class="contact-bar">
                    <button class="contact-btn" onclick="contactMerchant()">联系商家</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
